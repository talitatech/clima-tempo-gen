<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌤️ Monitor de Risco Climático - Brasil</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="container">
        <header>
            <h1>
                🌤️ Monitor de Risco Climático
                <span class="sub">- Brasil</span>
            </h1>
            <div class="header-actions">
                <button class="btn btn-primary" id="btnRefresh">
                    <i class="fas fa-sync-alt"></i> Atualizar
                </button>
            </div>
        </header>

        <div class="status-bar" id="statusBar">
            <span class="status-item" data-filter="danger" role="button" tabindex="0">
                <span class="status-dot danger"></span>
                Perigo: <span class="status-count" id="countDanger">0</span>
            </span>
            <span class="status-item" data-filter="warning" role="button" tabindex="0">
                <span class="status-dot warning"></span>
                Atenção: <span class="status-count" id="countWarning">0</span>
            </span>
            <span class="status-item" data-filter="success" role="button" tabindex="0">
                <span class="status-dot success"></span>
                Seguro: <span class="status-count" id="countSuccess">0</span>
            </span>
            <span class="status-item" data-filter="all" role="button" tabindex="0">
                <i class="fas fa-city"></i>
                Total: <span class="status-count" id="countTotal">0</span>
            </span>
        </div>

        <div class="error-message" id="errorMessage">
            <div class="icon">⚠️</div>
            <h3>Ops! Algo deu errado</h3>
            <p id="errorText">Não foi possível carregar os dados.</p>
        </div>

        <div class="grid" id="cardsGrid"></div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
